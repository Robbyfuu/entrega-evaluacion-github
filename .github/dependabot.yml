# Dependabot: escaneo y actualizacion de dependencias (cierra sec-A06 del audit:
# antes no habia ninguna auditoria automatizada). Solo abre PRs; no toca el
# pipeline de release. Revisar/mergear los PRs cuando convenga.
version: 2
updates:
  # Cliente C# (.NET) — Velopack, LibGit2Sharp, WebView2, WPF-UI, etc.
  - package-ecosystem: "nuget"
    directory: "/csharp/src"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "csharp"

  # Panel Next.js
  - package-ecosystem: "npm"
    directory: "/admin-next"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "admin-next"

  # GitHub Actions del workflow de build/release
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
