name: Build C# (Velopack auto-update)

on:
  push:
    tags:
      - 'exe-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#exe-v}"
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF_NAME" ]; then TAG="2.2.0"; fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building version $TAG"

      - name: Restore
        working-directory: csharp/src
        run: dotnet restore

      - name: Publish (folder, NOT single-file — Velopack empaqueta)
        working-directory: csharp/src
        run: dotnet publish -c Release -r win-x64 --self-contained true -o ../../publish

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download previous releases (for delta updates)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p releases
          vpk download github --repoUrl "https://github.com/${{ github.repository }}" --token "$GH_TOKEN" --outputDir releases || echo "No previous releases (first run)"

      - name: Pack with Velopack
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          vpk pack \
            --packId EntregaEvaluacion \
            --packVersion "$VERSION" \
            --packDir publish \
            --mainExe EntregaEvaluacion.exe \
            --packTitle "Entrega de Evaluacion a GitHub" \
            --packAuthors "DUOC UC - FPY1101" \
            --outputDir releases

      - name: List releases output
        run: dir releases

      - name: Upload Velopack artifacts
        uses: actions/upload-artifact@v4
        with:
          name: velopack-release
          path: releases/*

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/exe-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            releases/*
            docs/Instructivo-Instalacion.pdf
